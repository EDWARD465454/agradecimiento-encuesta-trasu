<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:#fff;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0}
.page{max-width:680px;width:100%;margin:0 auto}
.banner-img{width:100%;display:block}
.content{padding:40px 48px 52px;text-align:center}
.check-wrap{width:72px;height:72px;margin:0 auto 24px;border-radius:50%;background:#e6f4ff;display:flex;align-items:center;justify-content:center;animation:pop .35s cubic-bezier(.34,1.56,.64,1) .2s both}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.checkmark{width:44px;height:44px;stroke:#0C5C9E;stroke-width:3.5;fill:none}
.checkmark__circle{stroke-dasharray:166;stroke-dashoffset:166;stroke:#00AEEF;fill:none;animation:stroke .5s cubic-bezier(.65,0,.45,1) .3s forwards}
.checkmark__check{stroke-dasharray:48;stroke-dashoffset:48;stroke:#0C5C9E;animation:stroke .25s cubic-bezier(.65,0,.45,1) .75s forwards}
@keyframes stroke{100%{stroke-dashoffset:0}}
.fade{opacity:0;transform:translateY(12px);animation:fadeUp .4s ease forwards}
.d1{animation-delay:.55s}.d2{animation-delay:.65s}.d3{animation-delay:.75s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
h1{color:#0C5C9E;font-size:24px;font-weight:800;line-height:1.35;margin-bottom:14px;letter-spacing:-.2px}
h1 span{color:#00AEEF}
.message{color:#555;font-size:15px;line-height:1.75;max-width:460px;margin:0 auto 28px}
.divider{border:none;border-top:1.5px solid #e0ecf7;width:56px;margin:0 auto 18px}
.footer-text{color:#aaa;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
@media(max-width:520px){.content{padding:28px 20px 40px}h1{font-size:20px}.message{font-size:14px}}
</style>
</head>
