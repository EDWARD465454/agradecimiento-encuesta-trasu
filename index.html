<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Finalizada - OSIPTEL TRASU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            background: #e8f0f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(12, 92, 158, 0.13);
            max-width: 680px;
            width: 100%;
            overflow: hidden;
        }

        .banner-img {
            width: 100%;
            display: block;
        }

        .content {
            padding: 44px 48px 52px;
            text-align: center;
        }

        /* Checkmark animado */
        .check-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            border-radius: 50%;
            background: #e6f4ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark {
            width: 52px;
            height: 52px;
            stroke: #0C5C9E;
            stroke-width: 3.5;
            fill: none;
            stroke-miterlimit: 10;
            animation: scale-pop 0.4s ease-in-out 0.8s both;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke: #00AEEF;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: #0C5C9E;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.65s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes scale-pop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        /* Fade-up para el texto */
        .content h1, .content p, .divider {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards;
        }
        .content h1  { animation-delay: 0.9s; }
        .content p   { animation-delay: 1.05s; }
        .divider      { animation-delay: 1.2s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #0C5C9E;
            font-size: 26px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        h1 span { color: #00AEEF; }

        .message {
            color: #555;
            font-size: 16px;
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto 32px;
        }

        .divider {
            border: none;
            border-top: 1.5px solid #e0ecf7;
            margin: 0 auto;
            width: 60px;
            margin-bottom: 20px;
        }

        .footer-text {
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
            animation-delay: 1.35s;
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @media (max-width: 520px) {
            .content { padding: 32px 24px 40px; }
            h1 { font-size: 20px; }
            .message { font-size: 15px; }
        }
    </style>
</head>
