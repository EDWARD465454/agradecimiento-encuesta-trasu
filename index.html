<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:#fff;padding:0;margin:0}
.wrapper{max-width:660px;margin:0 auto;width:100%}
.banner-img{width:100%;display:block;border-radius:0}
.content{padding:44px 48px 56px;text-align:center}
.check-wrap{width:76px;height:76px;margin:0 auto 26px;border-radius:50%;background:#e6f4ff;display:flex;align-items:center;justify-content:center;animation:pop .32s cubic-bezier(.34,1.56,.64,1) .15s both}
@keyframes pop{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
.checkmark{width:48px;height:48px;fill:none}
.checkmark__circle{stroke-dasharray:166;stroke-dashoffset:166;stroke:#00AEEF;stroke-width:3;fill:none;animation:stroke .48s cubic-bezier(.65,0,.45,1) .28s forwards}
.checkmark__check{stroke-dasharray:48;stroke-dashoffset:48;stroke:#0C5C9E;stroke-width:3.5;animation:stroke .22s cubic-bezier(.65,0,.45,1) .68s forwards}
@keyframes stroke{100%{stroke-dashoffset:0}}
.fade{opacity:0;transform:translateY(10px);animation:fadeUp .38s ease forwards}
.d1{animation-delay:.52s}.d2{animation-delay:.62s}.d3{animation-delay:.72s}
@keyframes fadeUp{to{opacity:1;transform:none}}
h1{color:#0C5C9E;font-size:26px;font-weight:800;line-height:1.3;margin-bottom:16px;letter-spacing:-.3px}
h1 span{color:#00AEEF}
.message{color:#555;font-size:16px;line-height:1.75;max-width:480px;margin:0 auto 30px}
.divider{border:none;border-top:1.5px solid #e0ecf7;width:60px;margin:0 auto 18px}
.footer{color:#aaa;font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
@media(max-width:680px){.wrapper{max-width:100%}.content{padding:32px 24px 44px}h1{font-size:22px}.message{font-size:15px}}
</style>
